version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: daily
      time: '00:00'
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # npm ecosystem covers the pnpm workspace (packages/* via pnpm-workspace.yaml).
  # Dependabot's `package-ecosystem: pnpm` is NOT supported yet — the `npm`
  # ecosystem auto-detects pnpm-lock.yaml and atomically updates BOTH
  # package.json AND pnpm-lock.yaml in the same PR.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
      time: '00:00'
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
