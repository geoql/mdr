name: 'Coverage'

on:
  workflow_call:

permissions:
  contents: read
  # id-token: write lets the Codecov step authenticate via OIDC instead of a
  # secret token. Repository secrets are withheld from Dependabot PRs, so the
  # token-based upload failed there ("Token required because branch is
  # protected"); the OIDC token IS available on Dependabot PRs, so this makes
  # the coverage upload succeed on every PR including Dependabot's.
  id-token: write

jobs:
  coverage:
    name: 'Code Coverage'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests with coverage
        run: pnpm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          flags: unittests
          name: geoql-mdr
          fail_ci_if_error: true
