packages:
  - 'apps/*'
  - 'plugins/*'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  onnxruntime-node: true
  protobufjs: true
  msgpackr-extract: true
  # apps/marketing (Nuxt 4 + Vite + Nitro + workerd) build prerequisites.
  unrs-resolver: true
  workerd: true
  vue-demi: true

# Default catalog — deps shared across every app (tooling + common Nuxt/Vue
# runtime). Referenced via `catalog:` in each app's package.json.
catalog:
  '@nuxt/eslint': ^1.16.0
  '@nuxt/eslint-config': ^1.16.0
  '@nuxt/icon': ^2.3.1
  '@nuxtjs/color-mode': ^4.0.1
  '@nuxtjs/plausible': ^3.0.2
  '@tailwindcss/vite': ^4.3.2
  '@types/node': ^26.1.0
  '@vueuse/core': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  eslint: ^10.6.0
  eslint-plugin-better-tailwindcss: ^4.6.1
  eslint-plugin-oxlint: ^1.73.0
  '@lucide/vue': ^1.23.0
  motion-v: ^2.3.0
  nuxt: ^4.4.8
  oxfmt: ^0.58.0
  oxlint: ^1.72.0
  reka-ui: ^2.10.1
  shadcn-nuxt: ^2.7.4
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.2
  tw-animate-css: ^1.4.0
  typescript: ^6.0.3
  vue: ^3.5.39
  vue-tsc: ^3.3.6
  wrangler: ^4.108.0

catalogs:
  # Marketing app-only deps — referenced via `catalog:app:marketing`.
  app:marketing:
    '@iconify-json/lucide': ^1.2.116
    '@nuxtjs/robots': ^6.1.2
    '@nuxtjs/sitemap': ^8.2.2

# pnpm v9+ in workspace mode SILENTLY IGNORES package.json's `pnpm.overrides`.
# Overrides MUST live here in pnpm-workspace.yaml.
overrides:
  # Force the workspace onto Vite 8 even though @nuxt/vite-builder (Nuxt 4.4.x)
  # declares a "vite": "^7" peer. The @vue/* family shares one caret base so
  # they dedupe to a single resolved minor (the lockfile pins it).
  vite: ^8.1.3
  vue: ^3.5.39
  '@vue/compiler-core': ^3.5.39
  '@vue/compiler-dom': ^3.5.39
  '@vue/compiler-sfc': ^3.5.39
  '@vue/compiler-ssr': ^3.5.39
  '@vue/reactivity': ^3.5.39
  '@vue/runtime-core': ^3.5.39
  '@vue/runtime-dom': ^3.5.39
  '@vue/server-renderer': ^3.5.39
  '@vue/shared': ^3.5.39

minimumReleaseAgeExclude:
  - vite
  - '@nuxt/*'
  - nuxt
  - reka-ui
  - wrangler
  - miniflare
  - workerd
  - '@types/*'
  - '@lucide/*'
  - oxfmt
  - '@oxfmt/*'
  - eslint-plugin-oxlint@1.73.0
