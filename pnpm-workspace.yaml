packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  onnxruntime-node: true
  protobufjs: true
  msgpackr-extract: true
  # apps/marketing (Nuxt 4 + Vite + Nitro + workerd) build prerequisites.
  unrs-resolver: true
  workerd: true
  vue-demi: true

# Default catalog — deps shared across every app (tooling + common Nuxt/Vue
# runtime). Referenced via `catalog:` in each app's package.json.
catalog:
  '@nuxt/eslint': ^1.16.0
  '@nuxt/eslint-config': ^1.16.0
  '@nuxt/icon': ^2.3.1
  '@nuxtjs/color-mode': ^4.0.1
  '@nuxtjs/plausible': ^3.0.2
  '@tailwindcss/vite': ^4.3.3
  '@types/node': ^26.1.1
  '@vueuse/core': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  eslint: ^10.7.0
  eslint-plugin-better-tailwindcss: ^4.7.0
  eslint-plugin-oxlint: ^1.73.0
  '@lucide/vue': ^1.25.0
  motion-v: ^2.3.0
  nuxt: ^4.5.0
  oxfmt: ^0.59.0
  oxlint: ^1.74.0
  reka-ui: ^2.10.1
  shadcn-nuxt: ^2.8.0
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.3
  tw-animate-css: ^1.4.0
  typescript: ^7.0.2
  vite-plus: ^0.2.5
  vue: ^3.5.40
  vue-tsc: ^3.3.7
  wrangler: ^4.112.0

catalogs:
  # Marketing app-only deps — referenced via `catalog:app:marketing`.
  app:marketing:
    '@iconify-json/lucide': ^1.2.118
    '@nuxtjs/robots': ^6.1.3

# pnpm v9+ in workspace mode SILENTLY IGNORES package.json's `pnpm.overrides`.
# Overrides MUST live here in pnpm-workspace.yaml.
overrides:
  # unhead >=3.2.0 fixes the streamingIifeCode string-literal corruption that
  # broke cloudflare_module builds on Nuxt 4.5.0 (nuxt/nuxt#35670). Within
  # nuxt's own ^3.1.8 range — remove once nuxt's floor moves past 3.2.x.
  unhead: ^3.2.1
  '@unhead/vue': ^3.2.1

minimumReleaseAgeExclude:
  - vite
  - '@nuxt/*'
  - nuxt
  - vue
  - '@vue/*'
  - reka-ui
  - wrangler
  - miniflare
  - workerd
  - '@types/*'
  - '@lucide/*'
  - typescript
  - '@typescript/*'
  - oxfmt
  - '@oxfmt/*'
  - vite-plus
  - '@voidzero-dev/*'
  - eslint-plugin-oxlint
  - '@commitlint/*'
  - '@opencode-ai/*'
  - vue-tsc
  - '@unhead/*'
  - unhead@3.2.1
